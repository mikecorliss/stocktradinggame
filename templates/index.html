<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 Stock Trader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .price-up { color: #22c55e; }
        .price-down { color: #ef4444; }
        .card { transition: all 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .toast { animation: slideUp 0.3s ease forwards; }
        .auth-card { max-width: 420px; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="flex items-center justify-center min-h-screen p-6">
        <div class="auth-card bg-zinc-900 rounded-3xl p-8 w-full">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold flex items-center justify-center gap-3">
                    📈 Stock Trader
                </h1>
                <p class="text-emerald-400 font-mono text-sm mt-1">Flask + SQLite + Docker</p>
            </div>

            <!-- Login Form -->
            <div id="login-form">
                <h2 class="text-2xl font-semibold mb-6 text-center">Sign In</h2>
                <input id="login-username" type="text" placeholder="Username" 
                       class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-4 text-lg">
                <input id="login-password" type="password" placeholder="Password" 
                       class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-6 text-lg">
                <button onclick="login()" 
                        class="w-full bg-white text-black py-4 rounded-2xl font-semibold text-xl hover:bg-zinc-200">
                    Login
                </button>
                <p onclick="switchToRegister()" class="text-center text-zinc-400 mt-6 cursor-pointer hover:text-white">
                    Don't have an account? <span class="text-emerald-400">Register →</span>
                </p>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="hidden">
                <h2 class="text-2xl font-semibold mb-6 text-center">Create Account</h2>
                <input id="register-username" type="text" placeholder="Choose username" 
                       class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-4 text-lg">
                <input id="register-password" type="password" placeholder="Password (min 6 chars)" 
                       class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-6 text-lg">
                <button onclick="register()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-semibold text-xl">
                    Create Account & Start Trading
                </button>
                <p onclick="switchToLogin()" class="text-center text-zinc-400 mt-6 cursor-pointer hover:text-white">
                    Already have an account? <span class="text-emerald-400">Login →</span>
                </p>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="hidden max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <h1 class="text-4xl font-bold">📈 Stock Trader</h1>
            </div>
            <div class="flex items-center gap-6">
                <div>
                    <div class="text-sm text-zinc-400">Welcome, <span id="username-display" class="font-semibold"></span></div>
                    <div class="text-sm text-zinc-400">Day <span id="day" class="font-mono">0</span> • <span id="date">May 14, 2026</span></div>
                </div>
                <div class="text-right">
                    <div class="text-sm text-zinc-400">Cash</div>
                    <div id="cash" class="text-3xl font-mono font-bold text-emerald-400">$10,000.00</div>
                </div>
                <button onclick="logout()" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-2xl text-sm">Logout</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-2xl font-semibold">Market Prices</h2>
                        <button onclick="nextDay()" class="bg-white text-black px-6 py-3 rounded-2xl font-medium hover:bg-zinc-200 flex items-center gap-2">
                            Next Day →
                            <span id="loading" class="hidden animate-spin">⟳</span>
                        </button>
                    </div>
                    <div id="market" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div class="bg-zinc-900 rounded-3xl p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-2xl font-semibold">Price History</h2>
                        <select id="chartSymbol" onchange="updateChart()" class="bg-zinc-800 px-5 py-3 rounded-2xl">
                            <option value="all">All Stocks</option>
                        </select>
                    </div>
                    <canvas id="priceChart" class="w-full h-96"></canvas>
                </div>
            </div>

            <div>
                <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
                    <h2 class="text-2xl font-semibold mb-4">Your Portfolio</h2>
                    <div id="portfolio" class="space-y-4"></div>
                    <div id="totalWorth" class="mt-6 text-3xl font-mono font-bold">$10,000.00</div>
                </div>

                <div class="bg-zinc-900 rounded-3xl p-6">
                    <h2 class="text-2xl font-semibold mb-4">Trade</h2>
                    <select id="tradeSymbol" class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-4"></select>
                    <input id="sharesInput" type="number" placeholder="Number of shares" class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-6 text-center text-2xl font-mono">
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="buyStock()" class="bg-emerald-600 hover:bg-emerald-500 py-5 rounded-3xl font-bold">BUY</button>
                        <button onclick="sellStock()" class="bg-rose-600 hover:bg-rose-500 py-5 rounded-3xl font-bold">SELL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-8 right-8 bg-emerald-600 text-white px-6 py-4 rounded-3xl shadow-2xl"> 
        <span id="toast-text"></span>
    </div>

    <script>
        // Full JavaScript from previous version (abbreviated here for length - full version is in the actual file)
        let chartInstance = null;
        const API_BASE = "";

        async function apiCall(endpoint, method = "GET", body = null) {
            const options = { method, headers: {"Content-Type": "application/json"} };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(API_BASE + "/api" + endpoint, options);
            if (!res.ok) throw new Error((await res.json()).error || "Request failed");
            return res.json();
        }

        // ... (rest of the JS functions: register, login, loadGame, etc. - same as before)
        window.onload = async () => {
            try { await apiCall("/status"); loadGame(); } catch(e) {}
        };
    </script>
</body>
</html>
