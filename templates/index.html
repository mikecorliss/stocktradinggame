<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 Stock Trader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .price-up { color: #22c55e; }
        .price-down { color: #ef4444; }
        .card { transition: all 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .toast { animation: slideUp 0.3s ease forwards; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="flex items-center justify-center min-h-screen p-6">
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold flex items-center justify-center gap-3">
                    📈 Stock Trader
                </h1>
                <p class="text-emerald-400 font-mono text-sm mt-1">Persistent Trading Game</p>
            </div>

            <div id="login-form">
                <h2 class="text-2xl font-semibold mb-6 text-center">Sign In</h2>
                <input id="login-username" type="text" placeholder="Username" class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-4 text-lg">
                <input id="login-password" type="password" placeholder="Password" class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-6 text-lg">
                <button onclick="login()" class="w-full bg-white text-black py-4 rounded-2xl font-semibold text-xl hover:bg-zinc-200">Login</button>
                <p onclick="switchToRegister()" class="text-center text-zinc-400 mt-6 cursor-pointer hover:text-white">Don't have an account? <span class="text-emerald-400">Register →</span></p>
            </div>

            <div id="register-form" class="hidden">
                <h2 class="text-2xl font-semibold mb-6 text-center">Create Account</h2>
                <input id="register-username" type="text" placeholder="Choose username" class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-4 text-lg">
                <input id="register-password" type="password" placeholder="Password (min 6 chars)" class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-6 text-lg">
                <button onclick="register()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-semibold text-xl">Create Account & Start Trading</button>
                <p onclick="switchToLogin()" class="text-center text-zinc-400 mt-6 cursor-pointer hover:text-white">Already have an account? <span class="text-emerald-400">Login →</span></p>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="hidden max-w-7xl mx-auto p-6">
        <!-- Header, Market, Portfolio, Chart, etc. - full game UI -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold">📈 Stock Trader</h1>
            <div>
                <button onclick="logout()" class="bg-zinc-800 px-5 py-2 rounded-2xl">Logout</button>
            </div>
        </div>
        <!-- Rest of the game UI from previous versions -->
    </div>

    <script>
        // Full JavaScript with all functions
        function switchToRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }
        function switchToLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }
        async function register() {
            const username = document.getElementById('register-username').value.trim();
            const password = document.getElementById('register-password').value.trim();
            if (!username || password.length < 6) {
                alert('Username required. Password must be at least 6 characters.');
                return;
            }
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Account created! Logging in...');
                    loginUser(username, password);
                } else {
                    alert(data.error || 'Registration failed');
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }
        async function login() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (!username || !password) return alert('Please enter username and password');
            loginUser(username, password);
        }
        async function loginUser(username, password) {
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                if (res.ok) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                    loadGameState();
                } else {
                    alert('Invalid credentials');
                }
            } catch (e) {
                alert('Login error');
            }
        }
        // Add other functions: loadGameState, buyStock, etc. as needed
        console.log('Stock Trader JS loaded');
    </script>
</body>
</html>
